version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: keygen-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keygen-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: keygen-backend
    restart: always
    ports:
      - "8082:8080"
    environment:
      ENV: prod
      HOST: 0.0.0.0
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      RSA_PRIVATE_KEY_PATH: /app/keys/private_key.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/public_key.pem
    volumes:
      - keys-data:/app/keys
    depends_on:
      db:
        condition: service_healthy
    networks:
      - keygen-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: keygen-frontend
    restart: always
    ports:
      - "8083:80"
    depends_on:
      - backend
    networks:
      - keygen-network

volumes:
  pg-data:
    driver: local
  keys-data:
    driver: local

networks:
  keygen-network:
    driver: bridge
